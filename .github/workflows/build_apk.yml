name: Build and Release APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PersonalExpenseTracker-APK
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: "Personal Expense Tracker - ${{ steps.date.outputs.date }}"
          body: |
            ## 💰 Personal Expense Tracker

            ### ⬇️ Download APK below and install on your Android phone!

            ### Features in this release:
            - Smart expense management with budget validation
            - Automatic savings calculation
            - Loan tracking and management
            - AI-based expense predictions
            - Receipt scanner
            - PDF report download
            - Firebase authentication
            - Push notifications for budget alerts

            ### How to install:
            1. Download `app-debug.apk` below
            2. On your phone go to Settings → Security → Allow Unknown Sources
            3. Install the APK
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
